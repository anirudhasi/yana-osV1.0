apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yana-ingress
  namespace: yana-production
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.yana.in
      secretName: yana-tls-production
  rules:
    - host: api.yana.in
      http:
        paths:
          - path: /api/v1/auth/
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8001
          - path: /api/v1/riders/
            pathType: Prefix
            backend:
              service:
                name: rider-service
                port:
                  number: 8002
          - path: /api/v1/fleet/
            pathType: Prefix
            backend:
              service:
                name: fleet-service
                port:
                  number: 8003
          - path: /telemetry/
            pathType: Prefix
            backend:
              service:
                name: fleet-telemetry
                port:
                  number: 8013
          - path: /api/v1/payments/
            pathType: Prefix
            backend:
              service:
                name: payments-service
                port:
                  number: 8004
          - path: /api/v1/marketplace/
            pathType: Prefix
            backend:
              service:
                name: marketplace-service
                port:
                  number: 8005
          - path: /api/v1/maintenance/
            pathType: Prefix
            backend:
              service:
                name: maintenance-service
                port:
                  number: 8006
          - path: /api/v1/skills/
            pathType: Prefix
            backend:
              service:
                name: skills-service
                port:
                  number: 8007
          - path: /api/v1/support/
            pathType: Prefix
            backend:
              service:
                name: support-service
                port:
                  number: 8008
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8081
---
