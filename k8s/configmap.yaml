apiVersion: v1
kind: ConfigMap
metadata:
  name: yana-config
  namespace: yana-production
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: config
data:
  POSTGRES_DB: yana_db
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  MINIO_HOST: minio
  MINIO_PORT: "9000"
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  DJANGO_SETTINGS_MODULE: config.settings
  DEBUG: "False"
  ALLOWED_HOSTS: "api.yana.in,localhost,127.0.0.1"
  CORS_ALLOWED_ORIGINS: "https://api.yana.in,https://admin.yana.in"
  AUTH_SERVICE_URL: http://auth-service:8001
  RIDER_SERVICE_URL: http://rider-service:8002
  FLEET_SERVICE_URL: http://fleet-service:8003
  FLEET_TELEMETRY_URL: http://fleet-telemetry:8013
  PAYMENTS_SERVICE_URL: http://payments-service:8004
  MARKETPLACE_SERVICE_URL: http://marketplace-service:8005
  MAINTENANCE_SERVICE_URL: http://maintenance-service:8006
  SKILLS_SERVICE_URL: http://skills-service:8007
  SUPPORT_SERVICE_URL: http://support-service:8008
  OTP_SIMULATE: "False"
  LOG_LEVEL: INFO
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yana-config
  namespace: yana-staging
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: config
data:
  POSTGRES_DB: yana_db
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  MINIO_HOST: minio
  MINIO_PORT: "9000"
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  DJANGO_SETTINGS_MODULE: config.settings
  DEBUG: "True"
  ALLOWED_HOSTS: "api-staging.yana.in,localhost,127.0.0.1"
  CORS_ALLOWED_ORIGINS: "https://api-staging.yana.in"
  AUTH_SERVICE_URL: http://auth-service:8001
  RIDER_SERVICE_URL: http://rider-service:8002
  FLEET_SERVICE_URL: http://fleet-service:8003
  FLEET_TELEMETRY_URL: http://fleet-telemetry:8013
  PAYMENTS_SERVICE_URL: http://payments-service:8004
  MARKETPLACE_SERVICE_URL: http://marketplace-service:8005
  MAINTENANCE_SERVICE_URL: http://maintenance-service:8006
  SKILLS_SERVICE_URL: http://skills-service:8007
  SUPPORT_SERVICE_URL: http://support-service:8008
  OTP_SIMULATE: "True"
  LOG_LEVEL: DEBUG
