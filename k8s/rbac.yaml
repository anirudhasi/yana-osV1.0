apiVersion: v1
kind: ServiceAccount
metadata:
  name: yana-deployer
  namespace: yana-production
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: rbac
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yana-deployer
  namespace: yana-staging
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: rbac
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: yana-deployer-role
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: yana-deployer-binding-production
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: yana-deployer-role
subjects:
  - kind: ServiceAccount
    name: yana-deployer
    namespace: yana-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: yana-deployer-binding-staging
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: yana-deployer-role
subjects:
  - kind: ServiceAccount
    name: yana-deployer
    namespace: yana-staging
