apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-celery-worker
  namespace: yana-production
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: fleet-celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleet-celery-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fleet-celery-worker
        app.kubernetes.io/name: yana-os
        app.kubernetes.io/component: fleet-celery-worker
    spec:
      serviceAccountName: yana-deployer
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: fleet-celery-worker
          image: ghcr.io/yana-os/fleet-service:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=4", "-Q", "fleet"]
          envFrom:
            - configMapRef:
                name: yana-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: POSTGRES_USER
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: DJANGO_SECRET_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: JWT_SECRET_KEY
            - name: PII_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: PII_ENCRYPTION_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      terminationGracePeriodSeconds: 60
