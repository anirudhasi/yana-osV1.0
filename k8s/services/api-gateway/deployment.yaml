apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: yana-production
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: yana-os
        app.kubernetes.io/component: api-gateway
    spec:
      serviceAccountName: yana-deployer
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: api-gateway
          image: ghcr.io/yana-os/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              protocol: TCP
          env:
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: AUTH_SERVICE_URL
            - name: RIDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: RIDER_SERVICE_URL
            - name: FLEET_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: FLEET_SERVICE_URL
            - name: FLEET_TELEMETRY_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: FLEET_TELEMETRY_URL
            - name: PAYMENTS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: PAYMENTS_SERVICE_URL
            - name: MARKETPLACE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: MARKETPLACE_SERVICE_URL
            - name: MAINTENANCE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: MAINTENANCE_SERVICE_URL
            - name: SKILLS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: SKILLS_SERVICE_URL
            - name: SUPPORT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: yana-config
                  key: SUPPORT_SERVICE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
