apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: support-service-hpa
  namespace: yana-production
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: support-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: support-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 400Mi
