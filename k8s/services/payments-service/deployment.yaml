apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: yana-production
  labels:
    app.kubernetes.io/name: yana-os
    app.kubernetes.io/component: payments-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: payments-service
        app.kubernetes.io/name: yana-os
        app.kubernetes.io/component: payments-service
    spec:
      serviceAccountName: yana-deployer
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: payments-service
          image: ghcr.io/yana-os/payments-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
              protocol: TCP
          envFrom:
            - configMapRef:
                name: yana-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: POSTGRES_USER
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: DJANGO_SECRET_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: JWT_SECRET_KEY
            - name: PII_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: PII_ENCRYPTION_KEY
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: yana-secrets
                  key: RAZORPAY_KEY_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
