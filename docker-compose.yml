services:
  # ─── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: yana_postgres
    environment:
      POSTGRES_DB: yana_os
      POSTGRES_USER: yana_user
      POSTGRES_PASSWORD: yana_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yana_user -d yana_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yana_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: yana_minio
    environment:
      MINIO_ROOT_USER: yana_minio
      MINIO_ROOT_PASSWORD: yana_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auth Service ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: yana_auth
    env_file:
      - ./services/auth-service/.env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/auth-service:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8001"

  # ─── Rider Service ────────────────────────────────────────────
  rider-service:
    build:
      context: ./services/rider-service
      dockerfile: Dockerfile
    container_name: yana_rider
    env_file:
      - ./services/rider-service/.env
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./services/rider-service:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8002"

  # ─── Rider Service Celery Worker ──────────────────────────────
  rider-celery:
    build:
      context: ./services/rider-service
      dockerfile: Dockerfile
    container_name: yana_rider_celery
    env_file:
      - ./services/rider-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/rider-service:/app
    command: celery -A rider_service.celery worker --loglevel=info --concurrency=4

  fleet-service:
    build:
      context: ./services/fleet-service
      dockerfile: Dockerfile
    container_name: yana_fleet
    env_file:
      - ./services/fleet-service/.env
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/fleet-service:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8003"

  fleet-celery:
    build:
      context: ./services/fleet-service
      dockerfile: Dockerfile
    container_name: yana_fleet_celery
    env_file:
      - ./services/fleet-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/fleet-service:/app
    command: celery -A fleet_service.celery worker --loglevel=info --concurrency=4 -B

  fleet-telemetry:
    build:
      context: ./services/fleet-service
      dockerfile: Dockerfile
    container_name: yana_fleet_telemetry
    env_file:
      - ./services/fleet-service/.env
    ports:
      - "8013:8013"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/fleet-service:/app
    command: >
      uvicorn fleet_service.telemetry.main:app
      --host 0.0.0.0 --port 8013
      --workers 2 --loop uvloop

  payments-service:
    build:
      context: ./services/payments-service
      dockerfile: Dockerfile
    container_name: yana_payments
    env_file:
      - ./services/payments-service/.env
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/payments-service:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8004"

  payments-celery:
    build:
      context: ./services/payments-service
      dockerfile: Dockerfile
    container_name: yana_payments_celery
    env_file:
      - ./services/payments-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/payments-service:/app
    command: celery -A payments_service.celery worker --loglevel=info --concurrency=4 -B

  marketplace-service:
    build:
      context: ./services/marketplace-service
      dockerfile: Dockerfile
    container_name: yana_marketplace
    env_file:
      - ./services/marketplace-service/.env
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/marketplace-service:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8005"

  marketplace-celery:
    build:
      context: ./services/marketplace-service
      dockerfile: Dockerfile
    container_name: yana_marketplace_celery
    env_file:
      - ./services/marketplace-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/marketplace-service:/app
    command: celery -A marketplace_service.celery worker --loglevel=info --concurrency=4 -B

  maintenance-service:
    build:
      context: ./services/maintenance-service
      dockerfile: Dockerfile
    container_name: yana_maintenance
    profiles:
      - optional
    env_file:
      - ./services/maintenance-service/.env
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/maintenance-service:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8006"

  maintenance-celery:
    build:
      context: ./services/maintenance-service
      dockerfile: Dockerfile
    container_name: yana_maintenance_celery
    profiles:
      - optional
    env_file:
      - ./services/maintenance-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/maintenance-service:/app
    command: celery -A maintenance_service.celery worker --loglevel=info --concurrency=4 -B

  skills-service:
    build:
      context: ./services/skills-service
      dockerfile: Dockerfile
    container_name: yana_skills
    profiles:
      - optional
    env_file:
      - ./services/skills-service/.env
    ports:
      - "8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/skills-service:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8007"

  skills-celery:
    build:
      context: ./services/skills-service
      dockerfile: Dockerfile
    container_name: yana_skills_celery
    profiles:
      - optional
    env_file:
      - ./services/skills-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/skills-service:/app
    command: celery -A skills_service.celery worker --loglevel=info --concurrency=4 -B

  support-service:
    build:
      context: ./services/support-service
      dockerfile: Dockerfile
    container_name: yana_support
    profiles:
      - optional
    env_file:
      - ./services/support-service/.env
    ports:
      - "8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/support-service:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8008"

  support-celery:
    build:
      context: ./services/support-service
      dockerfile: Dockerfile
    container_name: yana_support_celery
    profiles:
      - optional
    env_file:
      - ./services/support-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/support-service:/app
    command: celery -A support_service.celery worker --loglevel=info --concurrency=4 -B

  # ─── API Gateway (Nginx) ──────────────────────────────────────
  nginx:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: yana_nginx
    environment:
      MAINTENANCE_SERVICE_HOST: ${MAINTENANCE_SERVICE_HOST:-127.0.0.1:65535}
      SKILLS_SERVICE_HOST: ${SKILLS_SERVICE_HOST:-127.0.0.1:65534}
      SUPPORT_SERVICE_HOST: ${SUPPORT_SERVICE_HOST:-127.0.0.1:65533}
    ports:
      - "8081:80"
    depends_on:
      - auth-service
      - rider-service
      - fleet-service
      - fleet-telemetry
      - payments-service
      - marketplace-service

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: yana_admin_dashboard
    profiles:
      - ui
    ports:
      - "3000:80"
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  minio_data:
