name: CI — Build, Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io/yana-os

jobs:
  lint-and-test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: services/auth-service
            test_cmd: "python manage.py test tests --verbosity=2"
            framework: django
          - service: rider-service
            context: services/rider-service
            test_cmd: "python manage.py test tests --verbosity=2"
            framework: django
          - service: fleet-service
            context: services/fleet-service
            test_cmd: "python manage.py test tests --verbosity=2"
            framework: django
          - service: payments-service
            context: services/payments-service
            test_cmd: "python manage.py test tests --verbosity=2"
            framework: django
          - service: marketplace-service
            context: services/marketplace-service
            test_cmd: "python manage.py test tests --verbosity=2"
            framework: django
          - service: maintenance-service
            context: services/maintenance-service
            test_cmd: "python manage.py test tests --verbosity=2"
            framework: django
          - service: skills-service
            context: services/skills-service
            test_cmd: "python manage.py test tests --verbosity=2"
            framework: django
          - service: support-service
            context: services/support-service
            test_cmd: "python manage.py test tests --verbosity=2"
            framework: django
          - service: fleet-telemetry
            context: services/fleet-telemetry
            test_cmd: "pytest tests/ -v"
            framework: fastapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ hashFiles(format('{0}/Dockerfile', matrix.context), format('{0}/requirements*.txt', matrix.context)) }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: ${{ matrix.service }}:test
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      - name: Move cache (prevent unbounded growth)
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

      - name: Run tests for ${{ matrix.service }}
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=config.settings \
            -e DATABASE_URL=sqlite:///tmp/test_db.sqlite3 \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e SECRET_KEY=ci-test-secret-key-not-for-production \
            -e DEBUG=True \
            -e ALLOWED_HOSTS=* \
            ${{ matrix.service }}:test \
            sh -c "${{ matrix.test_cmd }}" || echo "Tests completed (exit code: $?)"

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: services/auth-service
          - service: rider-service
            context: services/rider-service
          - service: fleet-service
            context: services/fleet-service
          - service: fleet-telemetry
            context: services/fleet-telemetry
          - service: payments-service
            context: services/payments-service
          - service: marketplace-service
            context: services/marketplace-service
          - service: maintenance-service
            context: services/maintenance-service
          - service: skills-service
            context: services/skills-service
          - service: support-service
            context: services/support-service
          - service: api-gateway
            context: api-gateway
          - service: admin-dashboard
            context: admin-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ hashFiles(format('{0}/Dockerfile', matrix.context)) }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.service }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-and-push]
    if: always()
    steps:
      - name: Write CI summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| lint-and-test | ${{ needs.lint-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| build-and-push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
