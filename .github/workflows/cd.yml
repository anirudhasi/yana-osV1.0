name: CD — Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI — Build, Lint & Test"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: ghcr.io/yana-os

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig (staging)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image SHA
        id: sha
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

      - name: Update auth-service image
        run: |
          kubectl set image deployment/auth-service \
            auth-service=${{ env.REGISTRY }}/auth-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update rider-service image
        run: |
          kubectl set image deployment/rider-service \
            rider-service=${{ env.REGISTRY }}/rider-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging
          kubectl set image deployment/rider-celery-worker \
            rider-celery-worker=${{ env.REGISTRY }}/rider-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update fleet-service image
        run: |
          kubectl set image deployment/fleet-service \
            fleet-service=${{ env.REGISTRY }}/fleet-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging
          kubectl set image deployment/fleet-celery-worker \
            fleet-celery-worker=${{ env.REGISTRY }}/fleet-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update fleet-telemetry image
        run: |
          kubectl set image deployment/fleet-telemetry \
            fleet-telemetry=${{ env.REGISTRY }}/fleet-telemetry:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update payments-service image
        run: |
          kubectl set image deployment/payments-service \
            payments-service=${{ env.REGISTRY }}/payments-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging
          kubectl set image deployment/payments-celery-worker \
            payments-celery-worker=${{ env.REGISTRY }}/payments-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update marketplace-service image
        run: |
          kubectl set image deployment/marketplace-service \
            marketplace-service=${{ env.REGISTRY }}/marketplace-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging
          kubectl set image deployment/marketplace-celery-worker \
            marketplace-celery-worker=${{ env.REGISTRY }}/marketplace-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update maintenance-service image
        run: |
          kubectl set image deployment/maintenance-service \
            maintenance-service=${{ env.REGISTRY }}/maintenance-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging
          kubectl set image deployment/maintenance-celery-worker \
            maintenance-celery-worker=${{ env.REGISTRY }}/maintenance-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update skills-service image
        run: |
          kubectl set image deployment/skills-service \
            skills-service=${{ env.REGISTRY }}/skills-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging
          kubectl set image deployment/skills-celery-worker \
            skills-celery-worker=${{ env.REGISTRY }}/skills-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update support-service image
        run: |
          kubectl set image deployment/support-service \
            support-service=${{ env.REGISTRY }}/support-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging
          kubectl set image deployment/support-celery-worker \
            support-celery-worker=${{ env.REGISTRY }}/support-service:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Update api-gateway image
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=${{ env.REGISTRY }}/api-gateway:${{ steps.sha.outputs.sha }} \
            -n yana-staging

      - name: Wait for rollouts (staging)
        run: |
          NAMESPACE=yana-staging
          DEPLOYMENTS=(
            auth-service
            rider-service
            fleet-service
            fleet-telemetry
            payments-service
            marketplace-service
            maintenance-service
            skills-service
            support-service
            api-gateway
            rider-celery-worker
            fleet-celery-worker
            payments-celery-worker
            marketplace-celery-worker
            maintenance-celery-worker
            skills-celery-worker
            support-celery-worker
          )
          for dep in "${DEPLOYMENTS[@]}"; do
            echo "Waiting for rollout: $dep"
            kubectl rollout status deployment/$dep -n $NAMESPACE --timeout=300s
          done

      - name: Write staging deploy summary
        if: always()
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image SHA:** \`${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** yana-staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Endpoints:**" >> $GITHUB_STEP_SUMMARY
          echo "- API: https://api-staging.yana.in/health/" >> $GITHUB_STEP_SUMMARY
          echo "- Auth: https://api-staging.yana.in/api/v1/auth/" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging deployment failed for SHA ${{ steps.sha.outputs.sha }}"
          echo "Run 'kubectl rollout undo deployment/<name> -n yana-staging' to rollback"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: ${{ needs.deploy-staging.result == 'success' }}
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig (production)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image SHA
        id: sha
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

      - name: Update all service images (production)
        run: |
          NAMESPACE=yana-production
          SHA=${{ steps.sha.outputs.sha }}
          SERVICES=(auth-service rider-service fleet-service fleet-telemetry payments-service marketplace-service maintenance-service skills-service support-service api-gateway)
          for svc in "${SERVICES[@]}"; do
            kubectl set image deployment/$svc $svc=${{ env.REGISTRY }}/$svc:$SHA -n $NAMESPACE
          done
          CELERY_SERVICES=(rider fleet payments marketplace maintenance skills support)
          for svc in "${CELERY_SERVICES[@]}"; do
            kubectl set image deployment/${svc}-celery-worker \
              ${svc}-celery-worker=${{ env.REGISTRY }}/${svc}-service:$SHA \
              -n $NAMESPACE || true
          done

      - name: Wait for rollouts (production)
        run: |
          NAMESPACE=yana-production
          DEPLOYMENTS=(
            auth-service
            rider-service
            fleet-service
            fleet-telemetry
            payments-service
            marketplace-service
            maintenance-service
            skills-service
            support-service
            api-gateway
            rider-celery-worker
            fleet-celery-worker
            payments-celery-worker
            marketplace-celery-worker
            maintenance-celery-worker
            skills-celery-worker
            support-celery-worker
          )
          for dep in "${DEPLOYMENTS[@]}"; do
            echo "Waiting for rollout: $dep"
            kubectl rollout status deployment/$dep -n $NAMESPACE --timeout=300s
          done

      - name: Smoke tests (production)
        run: |
          GATEWAY_URL=https://api.yana.in
          echo "Running smoke tests against $GATEWAY_URL"

          check_endpoint() {
            local url=$1
            local label=$2
            local status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            if [ "$status" -eq 200 ]; then
              echo "PASS: $label => HTTP $status"
            else
              echo "FAIL: $label => HTTP $status"
              return 1
            fi
          }

          check_endpoint "$GATEWAY_URL/health/" "Gateway Health"
          check_endpoint "$GATEWAY_URL/api/v1/auth/health/" "Auth Service"
          check_endpoint "$GATEWAY_URL/api/v1/riders/health/" "Rider Service"
          check_endpoint "$GATEWAY_URL/api/v1/fleet/health/" "Fleet Service"
          check_endpoint "$GATEWAY_URL/api/v1/payments/health/" "Payments Service"
          check_endpoint "$GATEWAY_URL/api/v1/marketplace/health/" "Marketplace Service"
          check_endpoint "$GATEWAY_URL/api/v1/maintenance/health/" "Maintenance Service"
          check_endpoint "$GATEWAY_URL/api/v1/skills/health/" "Skills Service"
          check_endpoint "$GATEWAY_URL/api/v1/support/health/" "Support Service"

          echo "All smoke tests passed."

      - name: Write production deploy summary
        if: always()
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image SHA:** \`${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** yana-production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live Endpoint:** https://api.yana.in/health/" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deployment FAILED for SHA ${{ steps.sha.outputs.sha }}"
          echo "Immediate rollback: kubectl rollout undo deployment/<name> -n yana-production"
