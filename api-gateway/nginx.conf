events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:8001;
    }

    upstream rider_service {
        server rider-service:8002;
    }

    upstream fleet_service {
        server fleet-service:8003;
    }

    upstream fleet_telemetry {
        server fleet-telemetry:8013;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=rider_otp:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=telemetry:10m rate=500r/m;

    server {
        listen 80;
        server_name _;

        location = / {
            return 200 '{"service":"yana-os-gateway","status":"ok","message":"Open /demo/ for the local UI or use /health and /api/v1/... routes"}';
            add_header Content-Type application/json;
        }

        location = /demo {
            return 302 /demo/index.html;
        }

        location = /demo/ {
            return 302 /demo/index.html;
        }

        location /demo/ {
            alias /usr/share/nginx/html/demo/;
        }

        # Health check
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Auth service routes
        location /api/v1/auth/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://auth_service/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # OTP rate limit
        location /api/v1/auth/rider/send-otp {
            limit_req zone=rider_otp burst=3 nodelay;
            proxy_pass http://auth_service/api/v1/auth/rider/send-otp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Rider service routes
        location /api/v1/riders/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://rider_service/api/v1/riders/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # File uploads — bigger body
            client_max_body_size 20M;
            proxy_read_timeout 60s;
        }

        location /api/v1/fleet/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://fleet_service/api/v1/fleet/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /telemetry/ {
            limit_req zone=telemetry burst=100 nodelay;
            proxy_pass http://fleet_telemetry/telemetry/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }

        location /ws/ {
            proxy_pass http://fleet_telemetry/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
