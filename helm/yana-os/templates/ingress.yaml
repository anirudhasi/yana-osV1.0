{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yana-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "yana-os.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/v1/auth/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.auth.name }}
                port:
                  number: {{ .Values.services.auth.port }}
          - path: /api/v1/riders/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.rider.name }}
                port:
                  number: {{ .Values.services.rider.port }}
          - path: /api/v1/fleet/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.fleet.name }}
                port:
                  number: {{ .Values.services.fleet.port }}
          - path: /telemetry/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.fleetTelemetry.name }}
                port:
                  number: {{ .Values.services.fleetTelemetry.port }}
          - path: /api/v1/payments/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.payments.name }}
                port:
                  number: {{ .Values.services.payments.port }}
          - path: /api/v1/marketplace/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.marketplace.name }}
                port:
                  number: {{ .Values.services.marketplace.port }}
          - path: /api/v1/maintenance/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.maintenance.name }}
                port:
                  number: {{ .Values.services.maintenance.port }}
          - path: /api/v1/skills/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.skills.name }}
                port:
                  number: {{ .Values.services.skills.port }}
          - path: /api/v1/support/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.support.name }}
                port:
                  number: {{ .Values.services.support.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.apiGateway.name }}
                port:
                  number: {{ .Values.services.apiGateway.port }}
{{- end }}
