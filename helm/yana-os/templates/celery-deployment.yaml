{{- range $svcKey, $svc := .Values.services }}
{{- if $svc.celery }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name | replace "-service" "" }}-celery-worker
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "yana-os.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $svc.name | replace "-service" "" }}-celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $svc.name | replace "-service" "" }}-celery-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: {{ $svc.name | replace "-service" "" }}-celery-worker
        {{- include "yana-os.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $svc.name | replace "-service" "" }}-celery-worker
    spec:
      serviceAccountName: {{ include "yana-os.serviceAccountName" $ }}
      imagePullSecrets:
        {{- range $.Values.global.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      containers:
        - name: {{ $svc.name | replace "-service" "" }}-celery-worker
          image: {{ include "yana-os.image" (dict "svcName" $svc.name "context" $) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          command:
            - celery
            - -A
            - config
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - {{ default $svcKey $svc.celeryQueue }}
          envFrom:
            - configMapRef:
                name: yana-config
          env:
            {{- include "yana-os.commonEnv" $ | nindent 12 }}
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu | quote }}
              memory: {{ $svc.resources.requests.memory | quote }}
            limits:
              cpu: {{ $svc.resources.limits.cpu | quote }}
              memory: {{ $svc.resources.limits.memory | quote }}
      terminationGracePeriodSeconds: 60
{{- end }}
{{- end }}
