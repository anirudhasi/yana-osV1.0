## Yana OS Helm Chart — Default Values
## Override with values-staging.yaml or values-production.yaml

global:
  registry: ghcr.io/yana-os
  imageTag: latest
  imagePullPolicy: Always
  namespace: yana-production
  imagePullSecrets:
    - name: ghcr-pull-secret

## Service definitions — each entry drives a Deployment + Service + HPA
services:
  auth:
    name: auth-service
    port: 8001
    replicas: 2
    celery: false
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    probes:
      liveness:
        path: /health/
        initialDelaySeconds: 30
        periodSeconds: 30
      readiness:
        path: /health/
        initialDelaySeconds: 15
        periodSeconds: 10

  rider:
    name: rider-service
    port: 8002
    replicas: 2
    celery: true
    celeryQueue: rider
    resources:
