## HPA defaults (applied to all services)
hpa:
  minReplicas: 2
  maxReplicas: 10
  cpuTargetUtilization: 70
  memoryTargetValue: 400Mi

## Ingress configuration
ingress:
  enabled: true
  className: nginx
  host: api.yana.in
  tls: true
  tlsSecretName: yana-tls-production
  clusterIssuer: letsencrypt-prod
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

## ConfigMap values (non-secret)
config:
  postgresDb: yana_db
  postgresHost: postgres
  postgresPort: "5432"
  redisHost: redis
  redisPort: "6379"
  minioHost: minio
  minioPort: "9000"
  debug: "False"
  allowedHosts: "api.yana.in,localhost"
  logLevel: INFO
  otpSimulate: "False"

## Monitoring
monitoring:
  prometheus:
    enabled: true
    retention: 15d
    storageSize: 50Gi
  grafana:
    enabled: true
    adminPassword: changeme
    storageSize: 10Gi
    domain: grafana.yana.in

## Service account
serviceAccount:
  create: true
  name: yana-deployer
