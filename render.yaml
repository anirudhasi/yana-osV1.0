services:
  - name: yana-os-gateway
    type: web
    runtime: docker
    plan: free
    region: ohio
    rootDir: api-gateway
    dockerContext: api-gateway
    dockerfilePath: api-gateway/Dockerfile

  - name: auth-service
    type: pserv
    runtime: docker
    plan: starter
    region: ohio
    rootDir: services/auth-service
    dockerContext: services/auth-service
    dockerfilePath: services/auth-service/Dockerfile
    dockerCommand: sh -c "python manage.py migrate --noinput && gunicorn auth_service.wsgi:application --bind 0.0.0.0:8001 --workers 2 --timeout 60"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: OTP_SIMULATE
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: yana-os-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString

  - name: rider-service
    type: pserv
    runtime: docker
    plan: starter
    region: ohio
    rootDir: services/rider-service
    dockerContext: services/rider-service
    dockerfilePath: services/rider-service/Dockerfile
    dockerCommand: sh -c "python manage.py migrate --noinput && gunicorn rider_service.wsgi:application --bind 0.0.0.0:8002 --workers 2 --timeout 60"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        fromService:
          name: auth-service
          type: pserv
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: yana-os-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString
      - key: MINIO_ENDPOINT
        fromService:
          name: yana-os-minio
          type: pserv
          property: hostport
      - key: MINIO_ACCESS_KEY
        value: yana_minio
      - key: MINIO_SECRET_KEY
        value: yana_minio_secret
      - key: MINIO_BUCKET
        value: yana-documents
      - key: MINIO_USE_SSL
        value: "False"
      - key: PII_ENCRYPTION_KEY
        generateValue: true

  - name: fleet-service
    type: pserv
    runtime: docker
    plan: starter
    region: ohio
    rootDir: services/fleet-service
    dockerContext: services/fleet-service
    dockerfilePath: services/fleet-service/Dockerfile
    dockerCommand: sh -c "python manage.py migrate --noinput && gunicorn fleet_service.wsgi:application --bind 0.0.0.0:8003 --workers 2 --timeout 60"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        fromService:
          name: auth-service
          type: pserv
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: yana-os-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString

  - name: fleet-telemetry
    type: pserv
    runtime: docker
    plan: starter
    region: ohio
    rootDir: services/fleet-service
    dockerContext: services/fleet-service
    dockerfilePath: services/fleet-service/Dockerfile
    dockerCommand: uvicorn fleet_service.telemetry.main:app --host 0.0.0.0 --port 8013 --workers 2 --loop uvloop
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yana-os-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: yana-os-cache
          type: keyvalue
          property: connectionString

  - name: yana-os-minio
    type: pserv
    runtime: docker
    plan: starter
    region: ohio
    rootDir: docker/minio
    dockerContext: docker/minio
    dockerfilePath: docker/minio/Dockerfile
    dockerCommand: server /data --console-address ":9001"
    envVars:
      - key: MINIO_ROOT_USER
        value: yana_minio
      - key: MINIO_ROOT_PASSWORD
        value: yana_minio_secret

  - name: yana-os-cache
    type: keyvalue
    plan: starter
    region: ohio
    ipAllowList: []

databases:
  - name: yana-os-db
    plan: free
    region: ohio
